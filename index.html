<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backyard RP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #e87020;
      --orange-dim:  #9a4e18;
      --orange-pale: #f5a55a;
      --white:       #f0ece4;
      --muted:       #6b6560;
      --border:      rgba(232,112,32,0.15);
    }

    html, body {
      width: 100%; height: 100%;
      background: #080808;
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 100vh;
    }

    /* ── Rich background — radial glow + grain ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      /* Subtle warm radial glow emanating from center */
      background:
        radial-gradient(ellipse 60% 55% at 50% 45%, rgba(232,112,32,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 100% 80% at 50% 100%, rgba(120,50,10,0.12) 0%, transparent 60%),
        #080808;
      pointer-events: none; z-index: 0;
    }



    /* ── Center block ── */
    .center {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      padding: 0 20px;
    }

    /* Title scales fluidly with viewport, not just width */
    .server-name {
      font-family: 'Cormorant Garamond', serif;
      /* vmin scales relative to the smaller dimension — works in fullscreen AND narrow */
      font-size: clamp(72px, 16vmin, 160px);
      font-weight: 300;
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: var(--white);
      opacity: 0;
      animation: up 1s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }
    .server-name .rp {
      font-style: italic;
      color: var(--orange-pale);
    }

    .tagline {
      font-size: clamp(10px, 1.2vmin, 13px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: clamp(14px, 2.5vmin, 28px);
      opacity: 0;
      animation: up 0.9s ease 0.3s forwards;
    }

    .rule {
      width: clamp(260px, 36vmin, 500px);
      height: 1px;
      background: var(--border);
      margin: clamp(24px, 4vmin, 52px) 0 clamp(20px, 3.5vmin, 44px);
      opacity: 0;
      animation: up 0.9s ease 0.45s forwards;
    }

    /* ── Progress block ── */
    .status-block {
      width: clamp(260px, 36vmin, 480px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 1.2vmin, 14px);
      opacity: 0;
      animation: up 0.9s ease 0.55s forwards;
    }

    .status-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-text {
      font-size: clamp(11px, 1.3vmin, 13px);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
    .file-count {
      font-size: clamp(11px, 1.3vmin, 13px);
      color: var(--orange-dim);
    }

    .bar-track {
      width: 100%;
      height: 2px;
      background: rgba(232,112,32,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--orange-dim), var(--orange));
      border-radius: 2px;
      transition: width 0.35s ease;
    }

    .meta-row {
      display: flex;
      gap: clamp(12px, 2.5vmin, 28px);
      margin-top: clamp(4px, 0.8vmin, 10px);
      justify-content: center;
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .meta-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--orange);
      opacity: 0.5;
      flex-shrink: 0;
    }
    .meta-value {
      font-size: clamp(10px, 1.1vmin, 12px);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Music player ── */
    .player {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: clamp(10px, 1.5vmin, 18px) clamp(20px, 3vw, 48px);
      background: rgba(8,8,8,0.94);
      border-top: 1px solid rgba(232,112,32,0.12);
      backdrop-filter: blur(12px);
      opacity: 0;
      animation: up 0.9s ease 0.8s forwards;
    }

    .player-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 16px;
      flex-shrink: 0;
    }
    .waveform span {
      display: block;
      width: 2px;
      background: var(--orange);
      border-radius: 1px;
      opacity: 0.7;
    }
    .waveform span:nth-child(1) { animation: wave 1.1s ease-in-out 0.00s infinite alternate; }
    .waveform span:nth-child(2) { animation: wave 1.1s ease-in-out 0.15s infinite alternate; }
    .waveform span:nth-child(3) { animation: wave 1.1s ease-in-out 0.30s infinite alternate; }
    .waveform span:nth-child(4) { animation: wave 1.1s ease-in-out 0.10s infinite alternate; }
    .waveform span:nth-child(5) { animation: wave 1.1s ease-in-out 0.25s infinite alternate; }
    .waveform.paused span { animation-play-state: paused; }

    .track-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .track-name {
      font-size: clamp(11px, 1.3vmin, 13px);
      font-weight: 400;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-hint {
      font-size: clamp(9px, 1vmin, 11px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: clamp(10px, 2vmin, 20px);
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      transition: color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn:hover { color: var(--white); }
    .ctrl-btn.play-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(232,112,32,0.4);
      color: var(--orange);
    }
    .ctrl-btn.play-btn:hover {
      background: rgba(232,112,32,0.1);
      color: var(--orange-pale);
    }

    .player-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .vol-icon { color: var(--muted); display: flex; align-items: center; }

    input[type=range].vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: clamp(60px, 8vw, 100px);
      height: 2px;
      background: rgba(232,112,32,0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range].vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--orange);
      cursor: pointer;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes wave {
      from { height: 3px; }
      to   { height: 14px; }
    }
  </style>
</head>
<body>

  <div class="center">
    <h1 class="server-name">Backyard<br><span class="rp">RP</span></h1>
    <p class="tagline">everyone's welcome</p>
    <div class="rule"></div>
    <div class="status-block">
      <div class="status-row">
        <span class="status-text" id="status">Connecting...</span>
        <span class="file-count"  id="file-count"></span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar"></div>
      </div>
      <div class="meta-row">
        <div class="meta-item"><div class="meta-dot"></div><span class="meta-value" id="map-name">—</span></div>
        <div class="meta-item"><div class="meta-dot"></div><span class="meta-value" id="max-players">—</span></div>
        <div class="meta-item"><div class="meta-dot"></div><span class="meta-value" id="gamemode">DarkRP</span></div>
      </div>
    </div>
  </div>

  <!-- Music player bar -->
  <div class="player">
    <div class="player-left">
      <div class="waveform" id="waveform">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="track-info">
        <span class="track-name" id="track-name">Loading...</span>
        <span class="track-hint">Now Playing</span>
      </div>
    </div>

    <div class="player-controls">
      <button class="ctrl-btn" id="btn-prev" title="Previous">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polygon points="13,1 5,7 13,13" fill="currentColor"/>
          <rect x="1" y="1" width="2" height="12" rx="1" fill="currentColor"/>
        </svg>
      </button>
      <button class="ctrl-btn play-btn" id="btn-play" title="Play / Pause">
        <svg id="icon-play" width="12" height="14" viewBox="0 0 12 14" fill="none">
          <polygon points="0,0 12,7 0,14" fill="currentColor"/>
        </svg>
        <svg id="icon-pause" width="12" height="14" viewBox="0 0 12 14" fill="none" style="display:none;">
          <rect x="0" y="0" width="4" height="14" rx="1" fill="currentColor"/>
          <rect x="8" y="0" width="4" height="14" rx="1" fill="currentColor"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-next" title="Next">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polygon points="1,1 9,7 1,13" fill="currentColor"/>
          <rect x="11" y="1" width="2" height="12" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <div class="player-right">
      <span class="vol-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polygon points="1,4 5,4 9,1 9,13 5,10 1,10" fill="currentColor" opacity="0.6"/>
          <path d="M11 4.5 Q13 7 11 9.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
        </svg>
      </span>
      <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="0.6">
    </div>
  </div>

  <audio id="audio" preload="auto"></audio>

  <script>
    /* ── PLAYLIST — add your tracks here ── */
    var playlist = [
      { title: "Track 1", url: "music/Jojee - Think Of Anything.mp3" },
      { title: "Track 2", url: "music/track2.mp3" },
      { title: "Track 3", url: "music/track3.mp3" }
    ];
    /* ───────────────────────────────────── */

    var audio     = document.getElementById('audio');
    var trackName = document.getElementById('track-name');
    var waveform  = document.getElementById('waveform');
    var btnPlay   = document.getElementById('btn-play');
    var iconPlay  = document.getElementById('icon-play');
    var iconPause = document.getElementById('icon-pause');
    var volSlider = document.getElementById('vol-slider');

    var current = 0;
    var playing = false;

    function loadTrack(idx) {
      if (!playlist.length) return;
      current = ((idx % playlist.length) + playlist.length) % playlist.length;
      var t = playlist[current];
      audio.src = t.url;
      trackName.textContent = t.title;
      audio.load();
    }

    function setPlaying(state) {
      playing = state;
      iconPlay.style.display  = state ? 'none' : '';
      iconPause.style.display = state ? ''     : 'none';
      waveform.classList.toggle('paused', !state);
    }

    function play() {
      if (!playlist.length) return;
      audio.play().then(function() { setPlaying(true); }).catch(function() {});
    }

    function pause() {
      audio.pause();
      setPlaying(false);
    }

    btnPlay.addEventListener('click', function() { playing ? pause() : play(); });

    document.getElementById('btn-prev').addEventListener('click', function() {
      loadTrack(current - 1);
      if (playing) play();
    });

    document.getElementById('btn-next').addEventListener('click', function() {
      loadTrack(current + 1);
      if (playing) play();
    });

    audio.addEventListener('ended', function() {
      loadTrack(current + 1);
      play();
    });

    volSlider.addEventListener('input', function() {
      audio.volume = parseFloat(this.value);
    });

    audio.volume = parseFloat(volSlider.value);
    loadTrack(0);

    window.addEventListener('load', function() { play(); });

    /* ── GMod hooks ── */
    var totalFiles  = 0;
    var neededFiles = 0;

    function setBar(pct) {
      document.getElementById('bar').style.width = Math.min(100, Math.max(0, pct)) + '%';
    }
    function GameDetails(serverName, serverURL, mapName, maxPlayers, steamID, gamemode) {
      document.getElementById('map-name').textContent    = mapName    || '—';
      document.getElementById('max-players').textContent = maxPlayers ? maxPlayers + ' slots' : '—';
      if (gamemode) document.getElementById('gamemode').textContent = gamemode;
    }
    function SetStatusChanged(status) {
      document.getElementById('status').textContent = status || 'Loading...';
    }
    function DownloadingFile(fileName) {
      var parts = fileName.split('/');
      document.getElementById('status').textContent = 'Downloading ' + parts[parts.length - 1];
      if (totalFiles > 0) setBar(((totalFiles - neededFiles) / totalFiles) * 100);
    }
    function SetFilesTotal(total) { totalFiles = total; }
    function SetFilesNeeded(needed) {
      neededFiles = needed;
      if (totalFiles > 0) {
        var done = totalFiles - needed;
        setBar((done / totalFiles) * 100);
        document.getElementById('file-count').textContent = needed > 0 ? done + ' / ' + totalFiles : '';
        if (needed === 0) setBar(100);
      }
    }

    var fakePct = 0;
    var fakeTimer = setInterval(function() {
      fakePct += Math.random() * 2.5;
      if (fakePct >= 75) { clearInterval(fakeTimer); return; }
      if (totalFiles === 0) setBar(fakePct);
    }, 350);
  </script>

</body>
</html>
